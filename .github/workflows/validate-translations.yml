name: Validate Translations

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  validate:
    name: Validate Translation Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Validate translations
        run: php scripts/validate_all_translations.php

      - name: Upload validation logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: translation-validation-errors
          path: |
            scripts/*.csv
            scripts/*.txt
